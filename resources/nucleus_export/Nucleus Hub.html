<title>Innovate Utah — Connections Hub</title>

<!-- ════════════════════════════════════════════════════════════════════════
     NUCLEUS COLOR SYSTEM — sampled from nucleusfundutah.com
     ════════════════════════════════════════════════════════════════════════
     Dominant brand color extracted directly from NucleusFund_Blue.png:
       #0848B8 — the cobalt blue used in the logo and hero lockups.

     Palette is built around that anchor: white surfaces, soft pearl
     backgrounds, a single warm gold accent for energy, and a cool
     graphite for body text. No navy. No cream-heavy surfaces.

     ┌──────────────────────────┬───────────┬───────────────────────────┐
     │ TOKEN                    │ HEX       │ ROLE                      │
     ├──────────────────────────┼───────────┼───────────────────────────┤
     │ --nucleus-blue           │ #0848B8   │ PRIMARY (logo cobalt)     │
     │ --blue-700               │ #073A98   │ hover / pressed           │
     │ --blue-600               │ #0E54CC   │ links · solids            │
     │ --blue-500               │ #2D6FE0   │ medium accents            │
     │ --blue-300               │ #6E97EB   │ chart strokes             │
     │ --blue-100               │ #DCE6FA   │ tints / soft fills        │
     │ --blue-50                │ #F2F6FE   │ accent backgrounds        │
     │ --pearl                  │ #FAFBFD   │ page background           │
     │ --pearl-200              │ #EFF2F7   │ subtle dividers           │
     │ --pearl-300              │ #E2E6EE   │ borders                   │
     │ --gold                   │ #D89A36   │ ACCENT (Wasatch sunset)   │
     │ --gold-soft              │ #F4DEA8   │ accent tint               │
     │ --gold-deep              │ #B07F2A   │ accent text on light      │
     │ --graphite               │ #1A2233   │ body copy / headings      │
     │ --graphite-muted         │ #5A6478   │ secondary text            │
     │ --graphite-light         │ #94A0B5   │ placeholder / metadata    │
     │ --white                  │ #FFFFFF   │ surface                   │
     └──────────────────────────┴───────────┴───────────────────────────┘

     Usage rules:
       • Cobalt blue is the brand. Use it on the wordmark, primary CTAs,
         and the active match-score arc when ≥ 0.7.
       • Backgrounds: pearl + white only. No cream surfaces in chrome.
       • Gold is reserved for match scores, fundraising state, and the
         occasional editorial accent — it's expensive, spend it carefully.
       • Headings: Newsreader serif in cobalt blue.
       • Body: Geist sans in graphite.
     ════════════════════════════════════════════════════════════════════════ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  /* ─── COBALT BRAND PALETTE (sampled from NucleusFund_Blue.png) ─── */
  --nucleus-blue:      #0848B8;
  --blue-700:          #073A98;
  --blue-600:          #0E54CC;
  --blue-500:          #2D6FE0;
  --blue-400:          #4A85E5;
  --blue-300:          #6E97EB;
  --blue-200:          #A8C0F0;
  --blue-100:          #DCE6FA;
  --blue-50:           #F2F6FE;

  --pearl:             #FAFBFD;
  --pearl-100:         #F5F7FB;
  --pearl-200:         #EFF2F7;
  --pearl-300:         #E2E6EE;

  --gold:              #D89A36;
  --gold-soft:         #F4DEA8;
  --gold-deep:         #B07F2A;
  --gold-faint:        #FBF1D9;

  /* Expressive accents — use sparingly. Cobalt is still the brand. */
  --coral:             #E16A4D;   /* warm spotlight (fundraising urgency) */
  --coral-soft:        #FBE0D6;
  --sage:              #5A9D8C;   /* growth / active state                */
  --sage-soft:         #DEF0EA;
  --plum:              #7C5AA0;   /* community / mentor network          */
  --plum-soft:         #ECE3F4;

  --graphite:          #1A2233;
  --graphite-muted:    #5A6478;
  --graphite-light:    #94A0B5;
  --white:             #FFFFFF;

  /* ─── LEGACY ALIASES (so existing markup keeps working) ─── */
  --nucleus-blue-600:  var(--blue-700);
  --nucleus-blue-500:  var(--blue-600);
  --nucleus-blue-400:  var(--blue-500);
  --nucleus-blue-200:  var(--blue-200);
  --wasatch-whisper:   var(--blue-50);
  --whisper-50:        var(--pearl);
  --whisper-200:       var(--pearl-200);
  --whisper-300:       var(--pearl-300);
  --copper:            var(--gold);
  --copper-faint:      var(--gold-faint);
  --copper-soft:       var(--gold-soft);
  --charcoal:          var(--graphite);
  --slate:             var(--graphite-muted);
  --slate-light:       var(--graphite-light);

  --sand:              var(--blue-50);
  --sand-50:           var(--pearl);
  --sand-200:          var(--pearl-200);
  --sand-300:          var(--pearl-300);
  --clay:              var(--nucleus-blue);
  --clay-600:          var(--blue-700);
  --clay-500:          var(--blue-600);
  --clay-400:          var(--blue-500);
  --clay-200:          var(--blue-100);
  --ink:               var(--graphite);
  --ink-muted:         var(--graphite-muted);
  --ink-light:         var(--graphite-light);

  /* ─── SEMANTIC ALIASES ─── */
  --color-bg:          var(--whisper-50);
  --color-surface:     var(--white);
  --color-text:        var(--charcoal);
  --color-text-muted:  var(--slate);
  --color-border:      var(--whisper-300);
  --color-border-soft: var(--whisper-200);
  --color-primary:     var(--nucleus-blue);
  --color-accent:      var(--copper);

  /* ─── TYPE ─── */
  --font-display: "Newsreader", Georgia, serif;
  --font-sans:    "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono:    "Geist Mono", "JetBrains Mono", ui-monospace, monospace;

  /* ─── ELEVATION ─── */
  --shadow-card:  0 1px 2px rgba(15,44,79,0.04), 0 1px 1px rgba(15,44,79,0.03);
  --shadow-hover: 0 4px 16px rgba(15,44,79,0.08), 0 1px 2px rgba(15,44,79,0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--color-bg); color: var(--color-text);
             font-family: var(--font-sans); font-size: 14px; line-height: 1.5;
             -webkit-font-smoothing: antialiased; }
button { background: none; border: 0; cursor: pointer; color: inherit;
         font-family: inherit; font-size: inherit; }
input, textarea, select { font-family: inherit; color: inherit; outline: none; }
input:focus, textarea:focus, select:focus { border-color: var(--nucleus-blue-400) !important;
                                            box-shadow: 0 0 0 3px rgba(61,122,179,0.15); }
a { color: var(--nucleus-blue-500); text-decoration: none; }
a:hover { text-decoration: underline; }

.display { font-family: var(--font-display); }
.mono    { font-family: var(--font-mono); }
.tiny-caps { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
             color: var(--slate); font-weight: 500; }

.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border-soft);
  border-radius: 10px;
  box-shadow: var(--shadow-card);
}
.card-hover { transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s; }
.card-hover:hover { border-color: var(--nucleus-blue-200); box-shadow: var(--shadow-hover); }

/* ─── PILLS ─── */
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 999px;
  background: var(--whisper-200); color: var(--charcoal);
  font-size: 11.5px; font-weight: 500; line-height: 1.5;
  border: 1px solid transparent;
  white-space: nowrap;
}
.pill-blue   { background: rgba(61,122,179,0.10);  color: var(--nucleus-blue);   border-color: rgba(61,122,179,0.18); }
.pill-copper { background: var(--copper-faint);    color: #8a5e1f;               border-color: rgba(200,146,74,0.30); }
.pill-solid  { background: var(--nucleus-blue);    color: var(--wasatch-whisper); }

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 16px; border-radius: 7px;
  font-size: 13px; font-weight: 500; line-height: 1;
  transition: all 0.12s ease;
  border: 1px solid transparent;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--nucleus-blue); color: var(--wasatch-whisper);
               border-color: var(--nucleus-blue); }
.btn-primary:hover:not(:disabled) { background: var(--nucleus-blue-600); }
.btn-copper  { background: var(--copper); color: var(--white); border-color: var(--copper); }
.btn-copper:hover:not(:disabled) { background: #b58241; }
.btn-ghost   { background: transparent; color: var(--charcoal);
               border-color: var(--color-border); }
.btn-ghost:hover:not(:disabled) { background: var(--whisper-200); border-color: var(--whisper-300); }

/* ─── ANIMATIONS ─── */
@keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.fade-in { animation: fade-in 0.3s ease both; }
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.shimmer {
  background: linear-gradient(90deg, var(--whisper-200) 25%, var(--whisper-50) 50%, var(--whisper-200) 75%);
  background-size: 800px 100%;
  animation: shimmer 1.4s linear infinite;
  border-radius: 4px;
}

/* range input */
input[type="range"] {
  -webkit-appearance: none; appearance: none;
  height: 4px; background: var(--whisper-300); border-radius: 2px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--nucleus-blue); cursor: pointer;
  border: 3px solid var(--wasatch-whisper);
  box-shadow: 0 0 0 1px var(--nucleus-blue);
}
input[type="range"]::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--nucleus-blue); cursor: pointer; border: 3px solid var(--wasatch-whisper);
}

/* selection */
::selection { background: var(--nucleus-blue); color: var(--wasatch-whisper); }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#0F2C4F"/>
    <g transform="translate(100,100)">
      <circle r="46" fill="none" stroke="#F0E8D6" stroke-width="3"/>
      <text x="0" y="6" text-anchor="middle" font-family="Georgia, serif"
            font-size="44" font-style="italic" fill="#F0E8D6">N</text>
      <text x="0" y="78" text-anchor="middle" font-family="Georgia, serif"
            font-size="14" letter-spacing="6" fill="#B25438">HUB</text>
    </g>
  </svg>
</template>
<div id="root"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="swipe-deck.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [route, setRoute] = useState("browse");
  const [currentUser, setCurrentUser] = useState(window.NX.PEOPLE[1]); // Sarah Patel by default
  const [matchSeed, setMatchSeed] = useState({ person: null, startup: null });
  const [apiState, setApiState] = useState({ live: false });
  const [brandOpen, setBrandOpen] = useState(false);

  // expose hero content for the top-of-page banner
  window.NX_HERO = window.ROUTE_HERO[route] || window.ROUTE_HERO.browse;

  // ping backend on load (will fall back silently to mock)
  useEffect(() => {
    let dead = false;
    (async () => {
      const r = await window.NX.api.ping();
      if (!dead) setApiState({ ...r, url: window.NX.api.base });
    })();
    return () => { dead = true; };
  }, []);

  const goMatchPerson = (p) => {
    setMatchSeed({ person: p, startup: null });
    setRoute("match");
  };
  const goMatchStartup = (s) => {
    setMatchSeed({ person: null, startup: s });
    setRoute("match");
  };

  return (
    <div>
      <HeroStrip dense {...window.NX_HERO} />
      <TopNav route={route} setRoute={setRoute} currentUser={currentUser}
              apiState={apiState} onOpenBrand={() => setBrandOpen(true)} />

      {route === "browse" && (
        <BrowsePage
          onMatchPerson={goMatchPerson}
          onMatchStartup={goMatchStartup}
        />
      )}
      {route === "match" && (
        <MatchPage
          initialPerson={matchSeed.person}
          initialStartup={matchSeed.startup}
          currentUser={currentUser}
        />
      )}
      {route === "profile" && (
        <MyProfilePage
          currentUser={currentUser}
          onSwitchUser={(id) => setCurrentUser(window.NX.PEOPLE.find(p => p.id === id))}
          onMatchPerson={goMatchPerson}
        />
      )}
      {route === "onboard" && (
        <OnboardPage onComplete={(profile) => {
          // append the new profile, switch to it, and route to profile
          if (!window.NX.PEOPLE.find(p => p.id === profile.id)) {
            window.NX.PEOPLE.push(profile);
          }
          setCurrentUser(profile);
          setRoute("profile");
        }}/>
      )}

      <BrandPanel open={brandOpen} onClose={() => setBrandOpen(false)} />

      {/* footer / signature */}
      <footer style={{ padding:"32px 32px 48px", maxWidth:1440, margin:"0 auto",
                       borderTop:"1px solid var(--color-border)", color:"var(--slate)", fontSize:12 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12 }}>
          <div>Innovate Utah · Connections Hub  ·  for Utah's deep-tech ecosystem.</div>
          <div className="mono" style={{ fontSize:11, color:"var(--slate-light)" }}>
            backend: <span style={{ color: apiState.live ? "var(--copper)" : "var(--slate)" }}>
              {apiState.live ? `${window.NX.api.base} (live)` : "local mock"}
            </span>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
