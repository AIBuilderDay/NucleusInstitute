version: '3'

# Nucleus Institute — Utah Innovation Connections Hub
#
# SQLite-backed (file at backend/data/nucleus.db). No Docker needed.
# Mirrors the HEAL fastapi-1password-template's `env:generate` pattern: every
# item in the NUCLEUS 1Password vault becomes one line in backend/.env (item
# title is the env var name, the `password` field is the value).
#
# Quickstart:
#   task env:generate    # populate backend/.env from 1Password NUCLEUS vault
#   task dev             # run uvicorn with reload

vars:
  APP_NAME: nucleus
  EXTERNAL_PORT: "8765"

tasks:
  env:generate:
    desc: "Generate backend/.env from the NUCLEUS 1Password vault"
    preconditions:
      - sh: command -v op >/dev/null 2>&1
        msg: "1Password CLI not installed. brew install --cask 1password-cli"
      - sh: op account list >/dev/null 2>&1
        msg: "Not signed into 1Password. Run: op signin"
    cmds:
      - ./scripts/generate-env.sh

  dev:
    desc: "Run uvicorn on host with reload (SQLite — no Postgres needed)"
    dir: backend
    cmds:
      - uv run uvicorn app.main:app --reload --host 127.0.0.1 --port {{.EXTERNAL_PORT}}

  recruiter:dev:
    desc: "Run the HEAL hiring autopilot UI on :5175"
    dir: recruiter
    cmds:
      - pnpm install --silent
      - pnpm dev

  autopilot:dev:
    desc: "Run the HEAL hiring autopilot service on :8766 (separate from backend)"
    dir: autopilot
    cmds:
      - uv sync --quiet
      - uv run uvicorn app.main:app --reload --host 127.0.0.1 --port 8766

  up:
    desc: "Build + start backend and frontend in Docker (detached)"
    deps: [env:generate]
    cmds:
      - docker compose up --build -d

  logs:
    desc: "Tail combined backend + frontend container logs"
    cmds:
      - docker compose logs -f

  clean:
    desc: "Remove Python caches"
    cmds:
      - find backend -type d -name __pycache__ -prune -exec rm -rf {} +

  clean:db:
    desc: "Wipe the SQLite DB only (forces re-seed on next `task dev`)"
    prompt: "This deletes backend/data/nucleus.db. Continue?"
    cmds:
      - rm -f backend/data/nucleus.db

  clean:all:
    desc: "Wipe SQLite DB, generated .env, and Python caches"
    prompt: "This deletes backend/data/nucleus.db and backend/.env. Continue?"
    cmds:
      - rm -f backend/data/nucleus.db
      - rm -f backend/.env
      - find backend -type d -name __pycache__ -prune -exec rm -rf {} +
