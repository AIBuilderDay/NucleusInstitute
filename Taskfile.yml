version: '3'

# Nucleus Institute + HEAL Engineering Autopilot
#
# Three services share ONE env file at the repo root (./.env), generated by
# `task env:generate` from the NUCLEUS 1Password vault. Each item title is
# the env var name; the `password` field holds the value.
#
# Quickstart:
#   task env:generate    # populate ./.env from the NUCLEUS 1P vault
#   task start           # boot backend + autopilot + recruiter UI together
#
# Or run any one alone in its own terminal:
#   task dev             # backend           :8765
#   task autopilot:dev   # agent service     :8766
#   task recruiter:dev   # autopilot UI      :5175

vars:
  APP_NAME: nucleus
  BACKEND_PORT: "8765"
  AUTOPILOT_PORT: "8766"
  UI_PORT: "5175"

tasks:
  env:generate:
    desc: "Generate ./.env from the NUCLEUS 1Password vault (shared by backend + autopilot)"
    preconditions:
      - sh: command -v op >/dev/null 2>&1
        msg: "1Password CLI not installed. brew install --cask 1password-cli"
      - sh: op account list >/dev/null 2>&1
        msg: "Not signed into 1Password. Run: op signin"
    cmds:
      - ./scripts/generate-env.sh

  dev:
    desc: "Run the matching backend on :{{.BACKEND_PORT}}"
    dir: backend
    cmds:
      - uv run uvicorn app.main:app --reload --host 127.0.0.1 --port {{.BACKEND_PORT}}

  autopilot:dev:
    desc: "Run the HEAL hiring autopilot service on :{{.AUTOPILOT_PORT}}"
    dir: autopilot
    cmds:
      - uv sync --quiet
      - uv run uvicorn app.main:app --reload --host 127.0.0.1 --port {{.AUTOPILOT_PORT}}

  recruiter:dev:
    desc: "Run the HEAL hiring autopilot UI on :{{.UI_PORT}}"
    dir: recruiter
    cmds:
      - pnpm install --silent
      - pnpm dev

  start:
    desc: "Boot backend + autopilot + UI in Docker. Ctrl+C stops all of them."
    cmds:
      - docker compose up --build

  start:bg:
    desc: "Same as `task start` but detached. Tail with `task logs`."
    cmds:
      - docker compose up --build -d

  stop:
    desc: "Stop all containers (preserves DBs and named volumes)"
    cmds:
      - docker compose down

  logs:
    desc: "Tail combined backend + autopilot + UI logs"
    cmds:
      - docker compose logs -f

  ps:
    desc: "Show running compose services + their health"
    cmds:
      - docker compose ps

  clean:
    desc: "Remove Python caches"
    cmds:
      - find backend autopilot -type d -name __pycache__ -prune -exec rm -rf {} +

  clean:ports:
    desc: "Kill any host process holding a dev port (8765/8766/5173/5174/5175)"
    cmds:
      - |
        for p in 8765 8766 5173 5174 5175; do
          while pid=$(lsof -nP -iTCP:$p -sTCP:LISTEN 2>/dev/null | awk 'NR>1 && $1!="com.docke" {print $2; exit}'); [ -n "$pid" ]; do
            echo "killing PID $pid on :$p"
            kill -KILL "$pid" 2>/dev/null || true
          done
        done

  clean:db:
    desc: "Wipe the SQLite DBs only (matching backend + autopilot run log)"
    prompt: "This deletes backend/data/nucleus.db and autopilot/data/autopilot.db. Continue?"
    cmds:
      - rm -f backend/data/nucleus.db
      - rm -f autopilot/data/autopilot.db

  clean:all:
    desc: "Full reset: stop all containers, drop their volumes, wipe DBs, host venvs, and caches. Next `task start` is fully fresh."
    prompt: "This stops containers, drops their volumes, and deletes both SQLite DBs and host .venv dirs. Continue?"
    cmds:
      - docker compose down -v --remove-orphans 2>/dev/null || true
      - rm -f backend/data/nucleus.db
      - rm -f autopilot/data/autopilot.db
      # Host .venv dirs are not needed in docker mode — and if a stale one
      # lingers, the bind mount leaks it into the container and poisons the
      # named volume on first init (it'll be linked to a missing Python).
      - rm -rf backend/.venv autopilot/.venv
      - find backend autopilot -type d -name __pycache__ -prune -exec rm -rf {} +
      - task: clean:ports
