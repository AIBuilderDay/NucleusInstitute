# Nucleus Institute — full-stack dev compose.
# Backend FastAPI on 8765, Vite frontend on 5173. Source is bind-mounted
# for hot reload; anonymous volumes shield .venv / node_modules from the
# host mount.

services:
  backend:
    build: ./backend
    container_name: nucleus-backend
    ports:
      - "8765:8765"
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: nucleus-frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_venv:
  frontend_node_modules:
